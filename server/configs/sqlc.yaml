version: "2"
sql:
  # AUTH
  - engine: "postgresql"
    schema: "../migrations"
    queries: "../internal/auth/repository/query"
    gen:
      go:
        package: "authdb"
        out: "../internal/auth/repository/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_interface: true
  # WORKSPACE
  - engine: "postgresql"
    schema: "../migrations"
    queries: "../internal/workspace/repository/query"
    gen:
      go:
        package: "workspacedb"
        out: "../internal/workspace/repository/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_interface: true
  # ACCESS
  - engine: "postgresql"
    schema: "../migrations"
    queries: "../internal/access/repository/query"
    gen:
      go:
        package: "accessdb"
        out: "../internal/access/repository/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_interface: true